services:
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_NODENAME: rabbitmq
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: passwd

  server:
    image: cc7261:msgqueue
    volumes:
      - ./server.py:/app/main.py
    depends_on:
      - rabbitmq
    deploy:
      replicas: 1

  client:
    image: cc7261:msgqueue
    volumes:
      - ./client.py:/app/main.py
    depends_on:
      - rabbitmq
    deploy:
      replicas: 1
