services:

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_NODENAME: rabbitmq
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: passwd

  producer:
    build:
        dockerfile: Dockerfile
    image: cc7261:msgqueue
    container_name: producer
    volumes:
      - ./producer.py:/app/main.py
    depends_on:
      - rabbitmq
    deploy:
      replicas: 1

  consumer:
    build:
       dockerfile: Dockerfile
    image: cc7261:msgqueue
    container_name: consumer
    volumes:
      - ./consumer.py:/app/main.py
    depends_on:
      - rabbitmq
    deploy:
      replicas: 1
